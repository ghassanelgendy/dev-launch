apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: payments-api
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm-chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  valuesFiles:
    - ./gitops/apps/payments-api/values.yaml
